spring:
  datasource:
    url: jdbc:mysql://localhost:3306/angelas_cakes
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  application:
    name: angelascakes
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
springdoc:
  default-flat-param-object: true
info:
  app:
    name: Angela's Cakes API
    version: 1.0
    description: Online cake shop REST API
upload:
  dir: uploads/images/